<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA WAVE — glass edition</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0c0a1a;
            position: relative;
            padding: 20px 16px 100px;
            color: #fff;
        }

        /* Анимированный фон с пятнами */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0b0818;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(70, 130, 255, 0.3) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(160, 100, 255, 0.35) 0%, transparent 35%),
                        radial-gradient(circle at 40% 80%, rgba(50, 200, 255, 0.25) 0%, transparent 40%),
                        radial-gradient(circle at 90% 20%, rgba(200, 100, 255, 0.3) 0%, transparent 30%);
            filter: blur(40px);
            animation: lightMove 16s infinite alternate ease-in-out;
        }

        .background::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 80, 255, 0.25) 0%, transparent 35%),
                        radial-gradient(circle at 30% 60%, rgba(180, 120, 255, 0.3) 0%, transparent 40%);
            filter: blur(50px);
            animation: lightMove2 20s infinite alternate-reverse;
        }

        @keyframes lightMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(-3%, -2%) scale(1.2); opacity: 0.9; }
        }

        @keyframes lightMove2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(4%, 3%) scale(1.3); opacity: 0.8; }
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            animation: logoFloat 4s ease-in-out infinite;
        }

        .logo img {
            height: 44px;
            width: auto;
            border-radius: 16px;
            filter: drop-shadow(0 0 12px rgba(200, 160, 255, 0.5));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Минималистичный стеклянный поиск */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .search-toggle {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        .search-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-expand {
            position: absolute;
            right: 0;
            top: 0;
            width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.3s ease, opacity 0.2s;
            background: rgba(20, 18, 30, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
        }

        .search-expand.active {
            width: 220px;
            opacity: 1;
            padding: 8px 16px;
        }

        .search-expand input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            padding: 6px 0;
        }

        .search-expand input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Стеклянные карточки разделов */
        .glass-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 450;
            color: #f0eaff;
            text-transform: lowercase;
            letter-spacing: -0.3px;
        }

        .section-header a {
            color: #c7b0ff;
            font-size: 15px;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.2s;
        }

        .section-header a:hover {
            opacity: 1;
        }

        .cards-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
        }

        .cards-scroll::-webkit-scrollbar {
            display: none;
        }

        .song-card, .artist-card {
            flex: 0 0 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.2s;
        }

        .artist-card {
            flex: 0 0 140px;
        }

        .song-card:hover, .artist-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
            border-color: rgba(220, 180, 255, 0.4);
        }

        .song-card img, .artist-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 10px;
        }

        .song-card h4, .artist-card h4 {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }

        .song-card p, .artist-card p {
            font-size: 14px;
            color: #cbb5ff;
        }

        /* Плеер внизу */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 18, 30, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            display: none;
            align-items: center;
            gap: 14px;
            z-index: 1000;
            cursor: pointer;
        }

        .player-bar.active {
            display: flex;
        }

        .player-cover {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 5px 20px #1e0c30;
        }

        .player-info {
            flex: 2;
            pointer-events: none;
        }

        .player-track {
            font-size: 16px;
            font-weight: 500;
            color: white;
        }

        .player-artist {
            font-size: 13px;
            color: #d2b5ff;
        }

        .player-controls-mini {
            display: flex;
            gap: 18px;
            align-items: center;
            pointer-events: auto;
        }

        .player-controls-mini i {
            font-size: 26px;
            color: #f0e0ff;
            transition: 0.1s;
        }

        .player-controls-mini i:active {
            transform: scale(0.9);
        }

        .player-progress {
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.15);
            cursor: pointer;
            pointer-events: auto;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f09aff, #c08eff, #a07eff);
            transition: width 0.1s;
            border-radius: 0 3px 3px 0;
        }

        /* ВЫДВИЖНАЯ ПАНЕЛЬ (исправленная структура) */
        .player-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 92vh;
            background: rgba(18, 14, 30, 0.98);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 24px 20px 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 2000;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .player-drawer.active {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .drawer-close {
            font-size: 28px;
            color: #e0c8ff;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
        }

        .drawer-close:hover {
            opacity: 1;
        }

        .drawer-cover {
            width: 220px;
            height: 220px;
            border-radius: 32px;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 20px 40px #1a0a28;
        }

        .drawer-track {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .drawer-artist {
            font-size: 18px;
            color: #dbb5ff;
            text-align: center;
            margin-bottom: 15px;
        }

        .drawer-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0 10px;
        }

        .drawer-controls i {
            font-size: 40px;
            color: #fff0ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .drawer-controls i:active {
            transform: scale(0.9);
        }

        /* Блок текста (скрыт по умолчанию) */
        .drawer-lyrics-container {
            display: none;
            flex: 1;
            min-height: 0;
            flex-direction: column;
            margin: 10px 0;
        }

        .drawer-lyrics-container.active {
            display: flex;
        }

        .drawer-lyrics-container h4 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #e1caff;
            font-weight: 400;
        }

        .drawer-lyrics {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 16px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.6;
            color: #f0e0ff;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: #b07aff rgba(255,255,255,0.1);
            white-space: pre-wrap; /* сохраняем переносы строк */
        }

        .drawer-lyrics::-webkit-scrollbar {
            width: 4px;
        }

        .drawer-lyrics::-webkit-scrollbar-thumb {
            background: #b07aff;
            border-radius: 10px;
        }

        /* Дополнительные иконки прижаты к низу */
        .drawer-extra {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-top: auto; /* прижимает к низу, когда текст скрыт */
            padding: 15px 0 5px;
        }

        .drawer-extra i {
            font-size: 28px;
            color: #e0c8ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .drawer-extra i:hover {
            color: white;
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* МОДАЛКА ПРОФИЛЯ (современный стиль) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(25, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .close-btn {
            float: right;
            font-size: 28px;
            color: #dbb0ff;
            cursor: pointer;
        }

        .artist-profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .artist-detail-photo {
            width: 150px;
            height: 150px;
            border-radius: 40px;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .artist-profile-name {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #e0c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .artist-profile-badge {
            display: inline-block;
            background: rgba(180, 130, 255, 0.2);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #dbb5ff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .profile-section {
            margin-top: 25px;
        }

        .profile-section h4 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #e0c8ff;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .profile-albums, .profile-songs {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 16px;
        }

        .album-item, .song-item {
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            margin-bottom: 8px;
            font-size: 16px;
            color: #f0e0ff;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .album-item:last-child, .song-item:last-child {
            margin-bottom: 0;
        }

        /* Модалка текста (не используется) */
        #lyricsText {
            font-size: 15px;
            line-height: 1.6;
            margin-top: 20px;
            color: #e0ecff;
            white-space: pre-wrap;
        }
    </style>
</head>

            // DOM элементы
            const popularSongsGrid = document.getElementById('popularSongsGrid');
            const popularArtistsGrid = document.getElementById('popularArtistsGrid');
            const searchInput = document.getElementById('searchInput');
            const searchToggle = document.getElementById('searchToggle');
            const searchExpand = document.getElementById('searchExpand');
            const searchContainer = document.getElementById('searchContainer');

            const playerBar = document.getElementById('playerBar');
            const playerCover = document.getElementById('playerCover');
            const playerTrackName = document.getElementById('playerTrackName');
            const playerArtistName = document.getElementById('playerArtistName');
            const playerPlayPause = document.getElementById('playerPlayPause');
            const playerPrev = document.getElementById('playerPrev');
            const playerNext = document.getElementById('playerNext');
            const progressFill = document.getElementById('progressFill');
            const progressBarContainer = document.getElementById('progressBarContainer');

            const playerDrawer = document.getElementById('playerDrawer');
            const drawerOverlay = document.getElementById('drawerOverlay');
            const closeDrawer = document.getElementById('closeDrawer');
            const drawerCover = document.getElementById('drawerCover');
            const drawerTrackName = document.getElementById('drawerTrackName');
            const drawerArtistName = document.getElementById('drawerArtistName');
            const drawerLyrics = document.getElementById('drawerLyrics');
            const drawerLyricsBtn = document.getElementById('drawerLyricsBtn');
            const drawerPrev = document.getElementById('drawerPrev');
            const drawerPlayPause = document.getElementById('drawerPlayPause');
            const drawerNext = document.getElementById('drawerNext');
            const drawerLyricsContainer = document.getElementById('drawerLyricsContainer');

            const lyricsModal = document.getElementById('lyricsModal');
            const closeLyricsModal = document.getElementById('closeLyricsModal');
            const lyricsSongTitle = document.getElementById('lyricsSongTitle');
            const lyricsText = document.getElementById('lyricsText');
            const artistProfileModal = document.getElementById('artistProfileModal');
            const closeArtistProfileModal = document.getElementById('closeArtistProfileModal');
            const artistProfileContent = document.getElementById('artistProfileContent');

            let audio = new Audio();
            let currentTrackIndex = -1;

            // Рендер
            function renderSongs(filter = '') {
                const filtered = songs.filter(s => s.title.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()));
                popularSongsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">
                        <img src="${s.cover}" loading="lazy">
                        <h4>${s.title}</h4>
                        <p>${s.artist}</p>
                    </div>
                `).join('');
                attachSongListeners();
            }

            function attachSongListeners() {
                document.querySelectorAll('.song-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const trackId = card.dataset.trackId;
                        const track = songs.find(t => t.id === trackId);
                        if (track) playTrack(track);
                    });
                });
            }

            function renderArtists(filter = '') {
                const filtered = artists.filter(a => a.name.toLowerCase().includes(filter.toLowerCase()));
                popularArtistsGrid.innerHTML = filtered.map(a => `
                    <div class="artist-card" data-artist-id="${a.id}">
                        <img src="${a.photo}">
                        <h4>${a.name}</h4>
                        <p>популярно</p>
                    </div>
                `).join('');
                attachArtistListeners();
            }

            function attachArtistListeners() {
                document.querySelectorAll('.artist-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const artistId = card.dataset.artistId;
                        const artist = artists.find(a => a.id === artistId);
                        if (artist) showArtistModal(artist);
                    });
                });
            }

            // Плеер
            function playTrack(track) {
                audio.src = track.src;
                audio.play();
                currentTrackIndex = songs.findIndex(s => s.id === track.id);
                playerCover.src = track.cover;
                playerTrackName.textContent = track.title;
                playerArtistName.textContent = track.artist;
                playerBar.classList.add('active');
                playerPlayPause.classList.remove('fa-play-circle');
                playerPlayPause.classList.add('fa-pause-circle');
                drawerPlayPause.classList.remove('fa-play-circle');
                drawerPlayPause.classList.add('fa-pause-circle');
                drawerCover.src = track.cover;
                drawerTrackName.textContent = track.title;
                drawerArtistName.textContent = track.artist;
                drawerLyrics.textContent = track.lyrics || 'Текст песни пока не добавлен';
                drawerLyricsContainer.classList.remove('active');
            }

            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = percent + '%';
                }
            });

            audio.addEventListener('ended', nextTrack);

            function nextTrack() {
                if (currentTrackIndex < songs.length - 1) playTrack(songs[currentTrackIndex + 1]);
                else playTrack(songs[0]);
            }

            function prevTrack() {
                if (currentTrackIndex > 0) playTrack(songs[currentTrackIndex - 1]);
                else playTrack(songs[songs.length - 1]);
            }

            function togglePlayPause() {
                if (audio.paused) {
                    audio.play();
                    playerPlayPause.classList.remove('fa-play-circle');
                    playerPlayPause.classList.add('fa-pause-circle');
                    drawerPlayPause.classList.remove('fa-play-circle');
                    drawerPlayPause.classList.add('fa-pause-circle');
                } else {
                    audio.pause();
                    playerPlayPause.classList.remove('fa-pause-circle');
                    playerPlayPause.classList.add('fa-play-circle');
                    drawerPlayPause.classList.remove('fa-pause-circle');
                    drawerPlayPause.classList.add('fa-play-circle');
                }
            }

            playerPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
            playerNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
            playerPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });

            drawerPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
            drawerNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
            drawerPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });

            progressBarContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = progressBarContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                if (audio.duration) {
                    audio.currentTime = (clickX / width) * audio.duration;
                }
            });

            // Открытие выдвижной панели
            playerBar.addEventListener('click', (e) => {
                if (!e.target.closest('.player-controls-mini i') && !e.target.closest('.player-progress')) {
                    if (currentTrackIndex >= 0) {
                        playerDrawer.classList.add('active');
                        drawerOverlay.classList.add('active');
                    }
                }
            });

            function closeDrawerFunc() {
                playerDrawer.classList.remove('active');
                drawerOverlay.classList.remove('active');
                drawerLyricsContainer.classList.remove('active');
            }
            closeDrawer.addEventListener('click', closeDrawerFunc);
            drawerOverlay.addEventListener('click', closeDrawerFunc);

            // Открытие текста по кнопке
            drawerLyricsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                drawerLyricsContainer.classList.toggle('active');
            });

            // Поиск
            searchToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                searchExpand.classList.toggle('active');
                if (searchExpand.classList.contains('active')) {
                    searchInput.focus();
                }
            });

            document.addEventListener('dblclick', (e) => {
                if (!searchContainer.contains(e.target)) {
                    searchExpand.classList.remove('active');
                }
            });

            searchInput.addEventListener('input', (e) => {
                const val = e.target.value;
                renderSongs(val);
                renderArtists(val);
            });

            // Модалки
            closeLyricsModal.addEventListener('click', () => lyricsModal.classList.remove('active'));
            closeArtistProfileModal.addEventListener('click', () => artistProfileModal.classList.remove('active'));
            window.addEventListener('click', (e) => {
                if (e.target === lyricsModal) lyricsModal.classList.remove('active');
                if (e.target === artistProfileModal) artistProfileModal.classList.remove('active');
            });

            // Обновлённый профиль
            function showArtistModal(artist) {
                artistProfileContent.innerHTML = `
                    <div class="artist-profile-header">
                        <img src="${artist.photo}" class="artist-detail-photo">
                        <div class="artist-profile-name">${artist.name}</div>
                        <div class="artist-profile-badge">Артист</div>
                    </div>
                    <div class="profile-section">
                        <h4>Альбомы</h4>
                        <div class="profile-albums">
                            ${artist.albums.map(alb => `<div class="album-item">${alb.title}</div>`).join('')}
                        </div>
                    </div>
                    <div class="profile-section">
                        <h4>Популярные песни</h4>
                        <div class="profile-songs">
                            ${artist.popularSongs.map(s => `<div class="song-item">${s}</div>`).join('')}
                        </div>
                    </div>
                `;
                artistProfileModal.classList.add('active');
            }

            // Инициализация
            renderSongs();
            renderArtists();
        })();
    </script>
</body>
</html>
