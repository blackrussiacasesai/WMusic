<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA WAVE — glass edition</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0c0a1a;
            position: relative;
            padding: 20px 16px 100px;
            color: #fff;
        }

        .page-shell {
            position: relative;
            z-index: 1;
        }

        /* Анимированный фон с пятнами */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0b0818;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(70, 130, 255, 0.3) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(160, 100, 255, 0.35) 0%, transparent 35%),
                        radial-gradient(circle at 40% 80%, rgba(50, 200, 255, 0.25) 0%, transparent 40%),
                        radial-gradient(circle at 90% 20%, rgba(200, 100, 255, 0.3) 0%, transparent 30%);
            filter: blur(40px);
            animation: lightMove 16s infinite alternate ease-in-out;
        }

        .background::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 80, 255, 0.25) 0%, transparent 35%),
                        radial-gradient(circle at 30% 60%, rgba(180, 120, 255, 0.3) 0%, transparent 40%);
            filter: blur(50px);
            animation: lightMove2 20s infinite alternate-reverse;
        }

        @keyframes lightMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(-3%, -2%) scale(1.2); opacity: 0.9; }
        }

        @keyframes lightMove2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(4%, 3%) scale(1.3); opacity: 0.8; }
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            animation: logoFloat 4s ease-in-out infinite;
        }

        .logo img {
            height: 44px;
            width: auto;
            border-radius: 16px;
            filter: drop-shadow(0 0 12px rgba(200, 160, 255, 0.5));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Минималистичный стеклянный поиск */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .search-toggle {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        .search-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-expand {
            position: absolute;
            right: 0;
            top: 0;
            width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.3s ease, opacity 0.2s;
            background: rgba(20, 18, 30, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
        }

        .search-expand.active {
            width: 220px;
            opacity: 1;
            padding: 8px 16px;
        }

        .search-expand input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            padding: 6px 0;
        }

        .search-expand input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Стеклянные карточки разделов */
        .glass-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 450;
            color: #f0eaff;
            text-transform: lowercase;
            letter-spacing: -0.3px;
        }

        .section-header a {
            color: #c7b0ff;
            font-size: 15px;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.2s;
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .desktop-scroll-controls {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .desktop-scroll-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: #f3e8ff;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: 0.2s;
        }

        .desktop-scroll-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.32);
        }

        .section-header a:hover {
            opacity: 1;
        }

        .cards-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
            cursor: grab;
        }

        .cards-scroll.is-dragging {
            cursor: grabbing;
            user-select: none;
        }

        .cards-scroll::-webkit-scrollbar {
            display: none;
        }

        .song-card, .artist-card {
            flex: 0 0 150px;
            width: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.2s;
        }

        .song-card:hover, .artist-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
            border-color: rgba(220, 180, 255, 0.4);
        }

        .song-card img, .artist-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 10px;
        }

        .song-card h4, .artist-card h4 {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }

        .song-card p, .artist-card p {
            font-size: 14px;
            color: #cbb5ff;
        }

        .liked-empty {
            width: 100%;
            padding: 22px 16px;
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: rgba(231, 213, 255, 0.78);
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            font-size: 15px;
        }

        .upload-track-btn {
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.08);
            color: #f0e4ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-track-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(180, 220, 255, 0.66);
        }

        .drawer-action-btn.delete-track-btn {
            color: #ffd3e9;
            border-color: rgba(255, 180, 216, 0.42);
        }

        .drawer-action-btn.delete-track-btn:hover {
            color: #fff;
            border-color: rgba(255, 183, 214, 0.8);
            background: linear-gradient(145deg, rgba(255, 123, 180, 0.44), rgba(255, 123, 163, 0.24));
        }

        .drawer-action-btn.is-hidden {
            display: none;
        }

        .upload-form {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .upload-form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-form label {
            font-size: 14px;
            color: #e7d4ff;
        }

        .upload-form input,
        .upload-form textarea {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-radius: 14px;
            padding: 11px 12px;
            outline: none;
            font-size: 15px;
        }

        .upload-form textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.4;
        }

        .upload-form input[type="file"] {
            padding: 8px;
        }

        .upload-form-submit {
            margin-top: 8px;
            width: 100%;
            border: 1px solid rgba(183, 231, 255, 0.68);
            background: linear-gradient(145deg, rgba(147, 97, 255, 0.52), rgba(77, 178, 255, 0.35));
            color: #fff;
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        /* Плеер внизу */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 18, 30, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            display: none;
            align-items: center;
            gap: 14px;
            z-index: 1000;
            cursor: pointer;
        }

        .player-bar.active {
            display: flex;
        }

        .player-cover {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 5px 20px #1e0c30;
        }

        .player-info {
            flex: 2;
            pointer-events: none;
        }

        .player-track {
            font-size: 16px;
            font-weight: 500;
            color: white;
        }

        .player-artist {
            font-size: 13px;
            color: #d2b5ff;
        }

        .player-controls-mini {
            display: flex;
            gap: 18px;
            align-items: center;
            pointer-events: auto;
        }

        .player-controls-mini i {
            font-size: 26px;
            color: #f0e0ff;
            transition: 0.1s;
        }

        .player-controls-mini i:active {
            transform: scale(0.9);
        }

        .player-progress {
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.15);
            cursor: pointer;
            pointer-events: auto;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f09aff, #c08eff, #a07eff);
            transition: width 0.1s;
            border-radius: 0 3px 3px 0;
        }

        /* ВЫДВИЖНАЯ ПАНЕЛЬ (исправленная структура) */
        .player-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 92vh;
            background: rgba(18, 14, 30, 0.98);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 24px 20px 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 2000;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .player-drawer.active {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .drawer-close {
            font-size: 28px;
            color: #e0c8ff;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
        }

        .drawer-close:hover {
            opacity: 1;
        }

        .drawer-cover {
            width: 270px;
            height: 270px;
            border-radius: 32px;
            display: block;
            box-shadow: 0 20px 40px #1a0a28;
        }

        .drawer-cover-wrap {
            width: 294px;
            height: 294px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            position: relative;
            isolation: isolate;
        }

        .drawer-cover-wrap::before,
        .drawer-cover-wrap::after {
            content: '';
            position: absolute;
            inset: 14px;
            border-radius: 38px;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.82;
            animation: trackGlow 4.8s ease-in-out infinite;
        }

        .drawer-cover-wrap::before {
            background: radial-gradient(circle at 28% 32%, rgba(94, 214, 255, 0.6), rgba(130, 88, 255, 0.2) 62%, transparent 80%);
        }

        .drawer-cover-wrap::after {
            background: radial-gradient(circle at 72% 70%, rgba(235, 130, 255, 0.58), rgba(90, 148, 255, 0.18) 60%, transparent 82%);
            animation-delay: -2.4s;
        }

        @keyframes trackGlow {
            0%, 100% {
                transform: scale(0.93);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.98;
            }
        }

        .drawer-track {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .drawer-artist {
            font-size: 18px;
            color: #dbb5ff;
            text-align: center;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .drawer-plays {
            font-size: 13px;
            color: #c8b6de;
            text-align: center;
            margin-bottom: 14px;
        }

        .drawer-artist-link {
            color: #e7c9ff;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: 0.18s;
            cursor: pointer;
        }

        .drawer-artist-link:hover {
            color: #fff;
            border-color: rgba(190, 228, 255, 0.62);
            background: rgba(151, 99, 255, 0.24);
        }

        .drawer-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0 10px;
        }

        .drawer-controls i {
            font-size: 40px;
            color: #fff0ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .drawer-controls i:active {
            transform: scale(0.9);
        }

        /* Блок текста (скрыт по умолчанию) */
        .drawer-lyrics-container {
            display: flex;
            flex: 1;
            min-height: 0;
            flex-direction: column;
            margin: 10px 0;
            opacity: 0;
            transform: translateY(14px) scale(0.98);
            max-height: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease, max-height 0.35s ease;
        }

        .drawer-lyrics-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            max-height: 45vh;
            pointer-events: auto;
        }

        .drawer-lyrics-container h4 {
            font-size: 15px;
            margin-bottom: 12px;
            color: #e1caff;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .drawer-lyrics {
            background: linear-gradient(165deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
            border-radius: 26px;
            padding: 18px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.75;
            color: #f0e0ff;
            flex: 1;
            scrollbar-width: none;
            white-space: pre-wrap; /* сохраняем переносы строк */
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 26px rgba(0,0,0,0.24);
        }

        .drawer-lyrics::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        /* Дополнительные иконки прижаты к низу */
        .drawer-extra {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: auto; /* прижимает к низу, когда текст скрыт */
            padding: 15px 0 5px;
            flex-wrap: wrap;
        }

        .drawer-action-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: linear-gradient(160deg, rgba(255,255,255,0.11), rgba(255,255,255,0.02));
            color: #e0c8ff;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            display: grid;
            place-items: center;
        }

        .drawer-action-btn:hover {
            color: white;
            transform: translateY(-2px);
            border-color: rgba(194, 229, 255, 0.62);
        }

        .drawer-action-btn.active {
            color: #ffffff;
            border-color: rgba(175, 232, 255, 0.78);
            background: linear-gradient(145deg, rgba(152, 106, 255, 0.44), rgba(88, 196, 255, 0.22));
            box-shadow: 0 0 18px rgba(151, 109, 255, 0.36);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* МОДАЛКА ПРОФИЛЯ (современный стиль) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(25, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .close-btn {
            float: right;
            font-size: 28px;
            color: #dbb0ff;
            cursor: pointer;
        }

        /* Профиль артиста: выдвижной лист снизу */
        #artistProfileModal {
            align-items: flex-end;
            justify-content: center;
            background: rgba(0, 0, 0, 0.64);
        }

        #artistProfileModal .modal-content {
            width: min(980px, 100%);
            max-width: none;
            max-height: 92vh;
            overflow-y: auto;
            border-radius: 36px 36px 0 0;
            padding: 34px 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-bottom: none;
            box-shadow: 0 -24px 46px rgba(0, 0, 0, 0.55);
            position: relative;
            animation: artistSheetUp 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        #artistProfileModal .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            float: none;
            z-index: 2;
        }

        @keyframes artistSheetUp {
            from {
                transform: translateY(100%);
                opacity: 0.8;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .artist-profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .artist-photo-wrap {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 0 auto 16px;
            display: grid;
            place-items: center;
            isolation: isolate;
        }

        .artist-photo-wrap::before,
        .artist-photo-wrap::after {
            content: '';
            position: absolute;
            inset: 12px;
            border-radius: 42px;
            z-index: -1;
            filter: blur(16px);
            opacity: 0.8;
            animation: artistGlow 4.2s ease-in-out infinite;
        }

        .artist-photo-wrap::before {
            background: radial-gradient(circle at 35% 35%, rgba(92, 224, 255, 0.55), rgba(127, 88, 255, 0.15) 60%, transparent 75%);
        }

        .artist-photo-wrap::after {
            background: radial-gradient(circle at 70% 68%, rgba(226, 120, 255, 0.52), rgba(84, 134, 255, 0.16) 58%, transparent 75%);
            animation-delay: -2.1s;
        }

        @keyframes artistGlow {
            0%, 100% {
                transform: scale(0.94);
                opacity: 0.65;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.98;
            }
        }

        .artist-detail-photo {
            width: 150px;
            height: 150px;
            border-radius: 40px;
            object-fit: cover;
            display: block;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .artist-profile-name {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #e0c0ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .artist-profile-badge {

            function ensureTrackPlayCount(trackId, fallback = 0) {
                const id = String(trackId || '');
                if (!id) return 0;
                if (typeof trackPlayCounts[id] === 'number') return trackPlayCounts[id];

                const normalizedFallback = Math.max(0, Math.floor(Number(fallback) || 0));
                trackPlayCounts[id] = normalizedFallback;
                return normalizedFallback;
            }

            function syncTrackPlayCountsWithSongs() {
                let changed = false;
                songs.forEach((song) => {
                    const existing = trackPlayCounts[song.id];
                    if (typeof existing !== 'number') {
                        trackPlayCounts[song.id] = Math.max(0, Math.floor(Number(song.plays) || 0));
                        changed = true;
                    }
                    song.plays = trackPlayCounts[song.id];
                });
                if (changed) {
                    persistTrackPlayCounts();
                }
            }

            function getTrackPlayCount(trackId) {
                const id = String(trackId || '');
                if (!id) return 0;
                if (typeof trackPlayCounts[id] === 'number') return trackPlayCounts[id];

                const track = songs.find((song) => song.id === id);
                return ensureTrackPlayCount(id, track?.plays || 0);

                    title: song.title,
                    artist: song.artist,
                    plays: getTrackPlayCount(song.id),
                    isCustom: Boolean(song.isCustom),
                    isAdminAdded: Boolean(song.isAdminAdded)
                }));
                localStorage.setItem(ADMIN_SONG_CATALOG_KEY, JSON.stringify(catalog));
            }

            function addCustomTrackToSongs(track) {
                if (!track || !track.id || !track.title || !track.artist || !track.src) return;
                if (songs.some(s => s.id === String(track.id))) return;

                songs.push({
                    id: String(track.id),
                    title: String(track.title),
                    artist: String(track.artist),
                    cover: String(track.cover || DEFAULT_CUSTOM_COVER),
                    plays: Number(track.plays || 0),
                    src: String(track.src),
                    lyrics: String(track.lyrics || ''),
                    isCustom: true
                });

                ensureTrackPlayCount(track.id, track.plays || 0);
            }

            function appendCustomTracksToSongs() {
                try {
                    const raw = localStorage.getItem(CUSTOM_TRACKS_STORAGE_KEY);
                    if (!raw) return;
                    const parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed)) return;

                    parsed.forEach((track) => addCustomTrackToSongs(track));
                } catch (error) {
                    // ignore broken local storage payload
                }
            }

            function openCustomTracksDb() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(CUSTOM_TRACKS_DB_NAME, CUSTOM_TRACKS_DB_VERSION);

                    request.onupgradeneeded = () => {
                        const db = request.result;
                        if (!db.objectStoreNames.contains(CUSTOM_TRACKS_DB_STORE)) {
                            db.createObjectStore(CUSTOM_TRACKS_DB_STORE, { keyPath: 'id' });
                        }
                    };

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error || new Error('IndexedDB is not available'));
                });
            }

            function idbRequestToPromise(request) {
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error || new Error('IndexedDB request failed'));
                });
            }

            async function saveCustomTrackToDb(trackRecord) {
                const db = await openCustomTracksDb();
                try {
                    const tx = db.transaction(CUSTOM_TRACKS_DB_STORE, 'readwrite');
                    const store = tx.objectStore(CUSTOM_TRACKS_DB_STORE);
                    await idbRequestToPromise(store.put(trackRecord));
                } finally {
                    db.close();
                }
            }

            async function deleteCustomTrackFromDb(trackId) {
                const db = await openCustomTracksDb();
                try {
                    const tx = db.transaction(CUSTOM_TRACKS_DB_STORE, 'readwrite');
                    const store = tx.objectStore(CUSTOM_TRACKS_DB_STORE);
                    await idbRequestToPromise(store.delete(trackId));
                } finally {
                    db.close();
                }
            }

            async function loadCustomTracksFromDb() {
                const db = await openCustomTracksDb();
                try {
                    const tx = db.transaction(CUSTOM_TRACKS_DB_STORE, 'readonly');
                    const store = tx.objectStore(CUSTOM_TRACKS_DB_STORE);
                    const records = await idbRequestToPromise(store.getAll());
                    return Array.isArray(records) ? records : [];
                } finally {
                    db.close();
                }
            }

            async function hydrateCustomTracksFromDb() {
                try {
                    const records = await loadCustomTracksFromDb();
                    records.forEach((record) => {
                        if (!record || !record.id || !record.title || !record.artist || !record.audioBlob) return;

                        const src = URL.createObjectURL(record.audioBlob);
                        const cover = record.coverBlob
                            ? URL.createObjectURL(record.coverBlob)
                            : DEFAULT_CUSTOM_COVER;

                        addCustomTrackToSongs({
                            id: record.id,
                            title: record.title,
                            artist: record.artist,
                            plays: Number(record.plays || 0),
                            lyrics: String(record.lyrics || ''),
                            src,
                            cover
                        });
                    });
                } catch (error) {
                    // keep app usable even if IndexedDB is unavailable
                }
            }

            async function migrateLegacyCustomTracksToDb() {
                try {
                    const raw = localStorage.getItem(CUSTOM_TRACKS_STORAGE_KEY);
                    if (!raw) return;
                    const parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed) || !parsed.length) {
                        localStorage.removeItem(CUSTOM_TRACKS_STORAGE_KEY);
                        return;
                    }

                    // Legacy payload stores data URLs in localStorage and may exceed quota; move it once to IndexedDB.
                    for (const track of parsed) {
                        if (!track || !track.id || !track.title || !track.artist || !track.src) continue;
                        if (typeof track.src !== 'string' || !track.src.startsWith('data:')) continue;

                        const audioBlob = await fetch(track.src).then((r) => r.blob());
                        let coverBlob = null;
                        if (typeof track.cover === 'string' && track.cover.startsWith('data:')) {
                            coverBlob = await fetch(track.cover).then((r) => r.blob());
                        }

                        await saveCustomTrackToDb({
                            id: String(track.id),
                            title: String(track.title),
                            artist: String(track.artist),
                            plays: Number(track.plays || 0),
                            lyrics: String(track.lyrics || ''),
                            audioBlob,
                            coverBlob
                        });
                    }

                    localStorage.removeItem(CUSTOM_TRACKS_STORAGE_KEY);
                } catch (error) {
                    // keep legacy data as fallback if migration fails
                }
            }

            function setupLyricsForTrack(track) {
                drawerLyrics.textContent = track.lyrics || 'Текст песни пока не добавлен';
                drawerLyrics.scrollTop = 0;
                lyricsScrollOffset = 0;
                if (isAutoLyricsEnabled) {
                    startLyricsAutoScroll(true);
                }
            }

            function updateAutoScrollButtonState() {
                drawerAutoScrollBtn.classList.toggle('active', isAutoLyricsEnabled);
            }

            function getBaseLyricsScrollTarget() {
                if (!audio.duration || !Number.isFinite(audio.duration)) return null;
                const maxScrollTop = drawerLyrics.scrollHeight - drawerLyrics.clientHeight;
                if (maxScrollTop <= 0) return null;

                const progress = Math.min(1, Math.max(0, (audio.currentTime / audio.duration) * AUTO_LYRICS_SPEED));
                return maxScrollTop * progress;
            }

            function getLyricsScrollTarget() {
                const base = getBaseLyricsScrollTarget();
                if (base === null) return null;
                const maxScrollTop = drawerLyrics.scrollHeight - drawerLyrics.clientHeight;
                return Math.max(0, Math.min(maxScrollTop, base + lyricsScrollOffset));
            }

            function stopLyricsAutoScroll() {
                if (!autoLyricsRafId) return;
                cancelAnimationFrame(autoLyricsRafId);
                autoLyricsRafId = null;
            }

            function runLyricsAutoScroll() {
                if (!isAutoLyricsEnabled) {
                    autoLyricsRafId = null;
                    return;
                }

                const target = getLyricsScrollTarget();
                if (target !== null) {
                    const diff = target - drawerLyrics.scrollTop;
                    isAutoUpdatingLyricsScroll = true;
                    drawerLyrics.scrollTop += diff * 0.2;
                    isAutoUpdatingLyricsScroll = false;
                }

                autoLyricsRafId = requestAnimationFrame(runLyricsAutoScroll);
            }

            function startLyricsAutoScroll(forceSnap = false) {
                if (!isAutoLyricsEnabled) return;
                const target = getLyricsScrollTarget();
                if (forceSnap && target !== null) {
                    drawerLyrics.scrollTop = target;
                }

                if (!autoLyricsRafId) {
                    autoLyricsRafId = requestAnimationFrame(runLyricsAutoScroll);
                }
            }

            function toggleLyricsAutoScroll() {
                isAutoLyricsEnabled = !isAutoLyricsEnabled;
                updateAutoScrollButtonState();
                if (isAutoLyricsEnabled) {
                    startLyricsAutoScroll(true);
                } else {
                    stopLyricsAutoScroll();
                }
            }

            function normalizeName(name) {
                return name.toLowerCase().replace(/\s+/g, ' ').trim();
            }

            function findArtistByName(name) {
                const target = normalizeName(name);
                return artists.find(a => normalizeName(a.name) === target) || null;
            }

            function getTrackById(trackId) {
                return songs.find(s => s.id === trackId) || null;
            }

            function setQueueContext({ queueIds, sectionId, trackId, resetHistory = true }) {
                if (Array.isArray(queueIds) && queueIds.length) {
                    currentQueueIds = queueIds;
                }
                currentSectionId = sectionId || currentSectionId || 'popularSongs';
                currentQueueIndex = currentQueueIds.indexOf(trackId);
                if (currentQueueIndex < 0) {
                    currentQueueIds = [trackId];
                    currentQueueIndex = 0;
                }
                if (resetHistory) {
                    shuffleHistory.length = 0;
                }
            }

            function updateShuffleButtonState() {
                const isActive = Boolean(shuffleBySection[currentSectionId]);
                drawerShuffleBtn.classList.toggle('active', isActive);
            }

            function updateLikeButtonState() {
                drawerLikeBtn.classList.toggle('active', likedTrackIds.has(currentTrackId));

            function updateDeleteTrackButtonState() {

            function renderDrawerArtistLinks(artistText) {
                const names = artistText
                    .split(/,| feat\.? | ft\.? |&/gi)
                    .map(name => name.trim())
                    .filter(Boolean);

                drawerArtistName.innerHTML = names.map((name) => {

                    if (!artist) {

                }).join('');
            }

            function playTrackById(trackId, options = {}) {
                const track = getTrackById(trackId);
                if (!track) return;
                playTrack(track, options);
            }

            function enableMouseDragScroll(container) {
                let isDragging = false;
                let startX = 0;
                let previousX = 0;
                let suppressClick = false;
                let velocity = 0;
                let lastMoveTime = 0;
                let momentumFrame = null;

                const stopMomentum = () => {
                    if (momentumFrame) {
                        cancelAnimationFrame(momentumFrame);
                        momentumFrame = null;
                    }
                };

                const runMomentum = () => {
                    if (Math.abs(velocity) < 0.02) {
                        momentumFrame = null;
                        return;
                    }

                    container.scrollLeft -= velocity * 16;
                    velocity *= 0.92;
                    momentumFrame = requestAnimationFrame(runMomentum);
                };

                const handleMove = (e) => {
                    if (!isDragging) return;

                    const now = performance.now();
                    const currentX = e.clientX;
                    const deltaX = currentX - previousX;
                    const deltaTime = Math.max(now - lastMoveTime, 1);

                    if (Math.abs(currentX - startX) > 4) {
                        suppressClick = true;
                    }

                    container.scrollLeft -= deltaX;
                    velocity = deltaX / deltaTime;
                    previousX = currentX;
                    lastMoveTime = now;
                    e.preventDefault();
                };

                const stopDragging = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    container.classList.remove('is-dragging');
                    container.style.scrollBehavior = '';

                    if (Math.abs(velocity) > 0.05) {
                        stopMomentum();
                        momentumFrame = requestAnimationFrame(runMomentum);
                    }
                };

                container.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    e.preventDefault();
                    stopMomentum();
                    isDragging = true;
                    suppressClick = false;
                    startX = e.clientX;
                    previousX = e.clientX;
                    velocity = 0;
                    lastMoveTime = performance.now();
                    container.style.scrollBehavior = 'auto';
                    container.classList.add('is-dragging');
                });

                container.addEventListener('dragstart', (e) => e.preventDefault());
                container.addEventListener('wheel', (e) => {
                    if (window.innerWidth < 1024) return;

                    const maxScroll = container.scrollWidth - container.clientWidth;
                    if (maxScroll <= 0) return;

                    const rawDelta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
                    if (rawDelta === 0) return;

                    let delta = rawDelta;
                    if (e.deltaMode === 1) {
                        delta *= 16;
                    } else if (e.deltaMode === 2) {
                        delta *= window.innerHeight;
                    }

                    container.scrollLeft += delta * 0.9;
                    e.preventDefault();
                }, { passive: false });
                window.addEventListener('mousemove', handleMove, { passive: false });
                document.addEventListener('mouseup', stopDragging);
                window.addEventListener('blur', stopDragging);

                container.addEventListener('click', (e) => {
                    if (!suppressClick) return;
                    e.preventDefault();
                    e.stopPropagation();
                    suppressClick = false;
                }, true);
            }

            enableMouseDragScroll(popularSongsGrid);
            enableMouseDragScroll(popularArtistsGrid);
            enableMouseDragScroll(likedSongsGrid);
            enableMouseDragScroll(userSongsGrid);

            desktopScrollButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    const targetId = button.dataset.scrollTarget;
                    const direction = button.dataset.direction;
                    const container = document.getElementById(targetId);
                    if (!container) return;

                    const firstCard = container.querySelector('.song-card, .artist-card');
                    const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 210;
                    const styles = window.getComputedStyle(container);
                    const gap = parseFloat(styles.columnGap || styles.gap || '20') || 20;
                    const step = cardWidth + gap;
                    const offset = direction === 'prev' ? -step : step;

                    container.scrollBy({ left: offset, behavior: 'smooth' });
                });
            });

            // Рендер
            function renderSongs(filter = '') {
                const filtered = songs.filter(s =>
                    isTrackInTrending(s) &&
                    (s.title.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()))
                );
                popularSongsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">

                    </div>

                attachTrackCardListeners(popularSongsGrid, filtered.map(s => s.id), 'popularSongs');
            }

            function attachTrackCardListeners(container, queueIds, sectionId) {
                container.querySelectorAll('.song-card').forEach(card => {
                    card.onclick = () => {
                        const trackId = card.dataset.trackId;
                        playTrackById(trackId, { queueIds, sectionId, resetHistory: true });
                    };
                });
            }

            function renderLikedSongs(filter = '') {
                const likedTracks = [...likedTrackIds]
                    .map(id => getTrackById(id))
                    .filter(track => track && !hiddenSongIds.has(track.id));

                const filtered = likedTracks.filter(s =>
                    s.title.toLowerCase().includes(filter.toLowerCase()) ||
                    s.artist.toLowerCase().includes(filter.toLowerCase())
                );

                if (!filtered.length) {
                    likedSongsGrid.innerHTML = '<div class="liked-empty">Пока пусто. Нажми сердечко у трека, чтобы добавить сюда.</div>';
                    return;
                }

                likedSongsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">
                        <img src="${s.cover}" loading="lazy">
                        <h4>${s.title}</h4>
                        <p>${s.artist}</p>
                    </div>
                `).join('');

                attachTrackCardListeners(likedSongsGrid, filtered.map(s => s.id), 'likedSongs');
            }

            function renderUserSongs(filter = '') {
                const filtered = songs.filter(s =>
                    isTrackInUserSection(s) &&
                    (s.title.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()))
                );

                if (!filtered.length) {
                    userSongsGrid.innerHTML = '<div class="liked-empty">Здесь будут ваши треки после загрузки и треки, перенесенные в этот раздел из админки.</div>';
                    return;
                }

                userSongsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">
                        <img src="${s.cover}" loading="lazy">
                        <h4>${s.title}</h4>
                        <p>${s.artist}</p>
                    </div>
                `).join('');

                attachTrackCardListeners(userSongsGrid, filtered.map(s => s.id), 'userSongs');
            }

            function resetPlayerAfterTrackRemoval() {
                audio.pause();
                audio.removeAttribute('src');
                audio.load();

                currentTrackIndex = -1;
                currentTrackId = null;
                currentQueueIndex = -1;
                progressFill.style.width = '0%';

                playerBar.classList.remove('active');
                playerDrawer.classList.remove('active');
                drawerOverlay.classList.remove('active');
                drawerLyricsContainer.classList.remove('active');
                drawerDeleteTrackBtn.classList.add('is-hidden');
                drawerPlaysCount.textContent = '';

                playerPlayPause.classList.remove('fa-pause-circle');
                playerPlayPause.classList.add('fa-play-circle');
                drawerPlayPause.classList.remove('fa-pause-circle');
                drawerPlayPause.classList.add('fa-play-circle');
            }

            async function deleteCustomTrack(trackId) {
                if (!trackId) return;

                const trackIndex = songs.findIndex(s => s.id === trackId && s.isCustom);
                if (trackIndex < 0) return;

                const track = songs[trackIndex];
                const confirmDelete = window.confirm(`Удалить трек "${track.title}"?`);
                if (!confirmDelete) return;

                const wasCurrentTrack = currentTrackId === trackId;
                songs.splice(trackIndex, 1);

                likedTrackIds.delete(trackId);
                persistLikedTrackIds();

                delete sectionOverrides[trackId];
                hiddenSongIds.delete(trackId);
                persistSectionOverrides();
                persistHiddenSongIds();

                currentQueueIds = currentQueueIds.filter(id => id !== trackId);
                if (!currentQueueIds.length && songs.length) {
                    currentQueueIds = songs.map(s => s.id);
                }
                if (currentTrackId && !wasCurrentTrack) {
                    currentQueueIndex = currentQueueIds.indexOf(currentTrackId);
                }

                for (let i = shuffleHistory.length - 1; i >= 0; i -= 1) {
                    if (shuffleHistory[i] === trackId) {
                        shuffleHistory.splice(i, 1);
                    }
                }

                if (wasCurrentTrack) {
                    resetPlayerAfterTrackRemoval();
                }

                delete trackPlayCounts[trackId];
                persistTrackPlayCounts();

                try {
                    await deleteCustomTrackFromDb(trackId);
                } catch (error) {
                    // If IndexedDB fails, we still keep UI state updated.
                }

                const currentFilter = searchInput.value || '';
                renderSongs(currentFilter);
                renderLikedSongs(currentFilter);
                renderUserSongs(currentFilter);
                updateLikeButtonState();
                updateDeleteTrackButtonState();
                persistAdminSongCatalog();
            }

            function renderArtists(filter = '') {
                const filtered = artists.filter(a => a.name.toLowerCase().includes(filter.toLowerCase()));
                popularArtistsGrid.innerHTML = filtered.map(a => `
                    <div class="artist-card" data-artist-id="${a.id}">
                        <img src="${a.photo}">
                        <h4>${a.name}</h4>
                        <p>популярно</p>
                    </div>
                `).join('');
                attachArtistListeners();
            }

            function attachArtistListeners() {
                document.querySelectorAll('.artist-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const artistId = card.dataset.artistId;
                        const artist = artists.find(a => a.id === artistId);
                        if (artist) showArtistModal(artist);
                    });
                });
            }

            // Плеер
            function playTrack(track, options = {}) {
                audio.src = track.src;
                audio.play();
                currentTrackIndex = songs.findIndex(s => s.id === track.id);
                currentTrackId = track.id;
                currentPlaybackCounted = false;
                listenedSecondsThisSession = 0;
                lastPlaybackTimeSample = null;

                setQueueContext({
                    queueIds: options.queueIds || currentQueueIds,
                    sectionId: options.sectionId || currentSectionId,
                    trackId: track.id,
                    resetHistory: options.resetHistory !== false
                });

                playerCover.src = track.cover;
                playerTrackName.textContent = track.title;
                playerArtistName.textContent = track.artist;
                playerBar.classList.add('active');
                playerPlayPause.classList.remove('fa-play-circle');
                playerPlayPause.classList.add('fa-pause-circle');
                drawerPlayPause.classList.remove('fa-play-circle');
                drawerPlayPause.classList.add('fa-pause-circle');
                drawerCover.src = track.cover;
                drawerTrackName.textContent = track.title;
                renderDrawerArtistLinks(track.artist);
                drawerPlaysCount.textContent = `${formatPlayCount(getTrackPlayCount(track.id))} прослушиваний`;
                setupLyricsForTrack(track);
                drawerLyricsContainer.classList.remove('active');
                updateLyricsButtonState();
                updateShuffleButtonState();
                updateLikeButtonState();
                updateAutoScrollButtonState();
                updateDeleteTrackButtonState();
            }

            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = percent + '%';
                }

                if (lastPlaybackTimeSample === null) {
                    lastPlaybackTimeSample = audio.currentTime;
                } else {
                    const delta = audio.currentTime - lastPlaybackTimeSample;
                    // Ignore seek jumps and count only normal playback progression.
                    if (delta > 0 && delta <= 2.5) {
                        listenedSecondsThisSession += delta;
                    }
                    lastPlaybackTimeSample = audio.currentTime;
                }

                maybeCountCurrentTrackPlay(false);
            });

            audio.addEventListener('seeking', () => {
                lastPlaybackTimeSample = audio.currentTime;
            });

            audio.addEventListener('ended', () => {
                maybeCountCurrentTrackPlay(true);
                nextTrack();
            });

            function nextTrack() {
                if (!currentQueueIds.length) return;
                const isShuffle = Boolean(shuffleBySection[currentSectionId]);

                if (isShuffle && currentQueueIds.length > 1) {
                    if (currentTrackId) {
                        shuffleHistory.push(currentTrackId);
                    }

                    const available = currentQueueIds.filter(id => id !== currentTrackId);
                    const randomId = available[Math.floor(Math.random() * available.length)];
                    playTrackById(randomId, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
                    return;
                }

                const nextIndex = currentQueueIndex >= 0
                    ? (currentQueueIndex + 1) % currentQueueIds.length
                    : 0;
                const nextId = currentQueueIds[nextIndex];
                playTrackById(nextId, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
            }

            function prevTrack() {
                if (!currentQueueIds.length) return;
                const isShuffle = Boolean(shuffleBySection[currentSectionId]);

                if (isShuffle && shuffleHistory.length) {
                    const prevIdFromHistory = shuffleHistory.pop();
                    playTrackById(prevIdFromHistory, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
                    return;
                }

                const prevIndex = currentQueueIndex >= 0
                    ? (currentQueueIndex - 1 + currentQueueIds.length) % currentQueueIds.length
                    : 0;
                const prevId = currentQueueIds[prevIndex];
                playTrackById(prevId, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
            }

            function toggleShuffleForCurrentSection() {
                shuffleBySection[currentSectionId] = !shuffleBySection[currentSectionId];
                if (!shuffleBySection[currentSectionId]) {
                    shuffleHistory.length = 0;
                }
                updateShuffleButtonState();
            }

            function toggleLikeCurrentTrack() {
                if (!currentTrackId) return;
                if (likedTrackIds.has(currentTrackId)) {
                    likedTrackIds.delete(currentTrackId);
                } else {
                    likedTrackIds.add(currentTrackId);
                }
                persistLikedTrackIds();
                updateLikeButtonState();
                renderLikedSongs(searchInput.value || '');
            }

            function togglePlayPause() {
                if (audio.paused) {
                    audio.play();
                    playerPlayPause.classList.remove('fa-play-circle');
                    playerPlayPause.classList.add('fa-pause-circle');
                    drawerPlayPause.classList.remove('fa-play-circle');
                    drawerPlayPause.classList.add('fa-pause-circle');
                } else {
                    audio.pause();
                    playerPlayPause.classList.remove('fa-pause-circle');
                    playerPlayPause.classList.add('fa-play-circle');
                    drawerPlayPause.classList.remove('fa-pause-circle');
                    drawerPlayPause.classList.add('fa-play-circle');
                }
            }

            playerPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
            playerNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
            playerPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });

            drawerPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
            drawerNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
            drawerPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });

            progressBarContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = progressBarContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                if (audio.duration) {
                    audio.currentTime = (clickX / width) * audio.duration;
                    lastPlaybackTimeSample = audio.currentTime;
                    if (isAutoLyricsEnabled) {
                        startLyricsAutoScroll(true);
                    }
                }
            });

            // Открытие выдвижной панели
            playerBar.addEventListener('click', (e) => {
                if (!e.target.closest('.player-controls-mini i') && !e.target.closest('.player-progress')) {
                    if (currentTrackIndex >= 0) {
                        playerDrawer.classList.add('active');
                        drawerOverlay.classList.add('active');
                    }
                }
            });

            function closeDrawerFunc() {
                playerDrawer.classList.remove('active');
                drawerOverlay.classList.remove('active');
                drawerLyricsContainer.classList.remove('active');
                updateLyricsButtonState();
            }
            closeDrawer.addEventListener('click', closeDrawerFunc);
            drawerOverlay.addEventListener('click', closeDrawerFunc);

            // Открытие текста по кнопке
            drawerLyricsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                drawerLyricsContainer.classList.toggle('active');
                updateLyricsButtonState();
                if (isAutoLyricsEnabled) {
                    startLyricsAutoScroll(true);
                }
            });

            drawerShuffleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleShuffleForCurrentSection();
            });

            drawerLikeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLikeCurrentTrack();
            });

            drawerAutoScrollBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLyricsAutoScroll();
            });

            drawerDeleteTrackBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!currentTrackId) return;
                deleteCustomTrack(currentTrackId);
            });

            drawerLyrics.addEventListener('scroll', () => {
                if (!isAutoLyricsEnabled) return;
                if (isAutoUpdatingLyricsScroll) return;

                const base = getBaseLyricsScrollTarget();
                if (base === null) return;

                // После ручной прокрутки продолжаем автоскролл от позиции пользователя.
                lyricsScrollOffset = drawerLyrics.scrollTop - base;
            }, { passive: true });

            drawerArtistName.addEventListener('click', (e) => {
                const link = e.target.closest('[data-artist-id]');
                if (!link) return;
                const artistId = link.dataset.artistId;
                const artist = artists.find(a => a.id === artistId);
                if (artist) {
                    showArtistModal(artist);
                }
            });

            openUploadTrackModalBtn.addEventListener('click', () => {
                uploadTrackModal.classList.add('active');
            });

            closeUploadTrackModal.addEventListener('click', () => {
                uploadTrackModal.classList.remove('active');
            });

            uploadTrackForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const title = uploadTrackTitle.value.trim();
                const artist = uploadTrackArtist.value.trim();
                const lyrics = uploadTrackLyrics.value.trim();
                const audioFile = uploadTrackAudio.files && uploadTrackAudio.files[0];
                const coverFile = uploadTrackCover.files && uploadTrackCover.files[0];

                if (!title || !artist || !audioFile) {
                    return;
                }

                try {
                    const id = `u-${Date.now()}`;
                    const trackSrc = URL.createObjectURL(audioFile);
                    const trackCover = coverFile ? URL.createObjectURL(coverFile) : DEFAULT_CUSTOM_COVER;

                    const customTrack = {
                        id,
                        title,
                        artist,
                        cover: trackCover,
                        plays: 0,
                        src: trackSrc,
                        lyrics,
                        isCustom: true
                    };

                    songs.push(customTrack);

                    await saveCustomTrackToDb({
                        id,
                        title,
                        artist,
                        plays: 0,
                        lyrics,
                        audioBlob: audioFile,
                        coverBlob: coverFile || null
                    });

                    uploadTrackForm.reset();
                    uploadTrackModal.classList.remove('active');

                    const currentFilter = searchInput.value || '';
                    renderSongs(currentFilter);
                    renderLikedSongs(currentFilter);
                    renderUserSongs(currentFilter);
                    persistAdminSongCatalog();
                } catch (error) {
                    alert('Не удалось сохранить трек в хранилище браузера. Проверь, не запрещен ли доступ к данным сайта, и попробуй снова.');
                }
            });

            // Поиск
            searchToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                searchExpand.classList.toggle('active');
                if (searchExpand.classList.contains('active')) {
                    searchInput.focus();
                }
            });

            document.addEventListener('dblclick', (e) => {
                if (!searchContainer.contains(e.target)) {
                    searchExpand.classList.remove('active');
                }
            });

            searchInput.addEventListener('input', (e) => {
                const val = e.target.value;
                renderSongs(val);
                renderArtists(val);
                renderLikedSongs(val);
                renderUserSongs(val);
            });

            // Модалки
            closeLyricsModal.addEventListener('click', () => lyricsModal.classList.remove('active'));
            closeArtistProfileModal.addEventListener('click', () => artistProfileModal.classList.remove('active'));
            window.addEventListener('click', (e) => {
                if (e.target === lyricsModal) lyricsModal.classList.remove('active');
                if (e.target === artistProfileModal) artistProfileModal.classList.remove('active');
                if (e.target === uploadTrackModal) uploadTrackModal.classList.remove('active');
            });

            function findSongCoverByTitle(songTitle) {
                const normalizedTarget = songTitle.toLowerCase().trim();
                const exact = songs.find(s => s.title.toLowerCase().trim() === normalizedTarget);
                if (exact?.cover) return exact.cover;

                const fuzzy = songs.find(s => {
                    const normalized = s.title.toLowerCase().trim();
                    return normalized.includes(normalizedTarget) || normalizedTarget.includes(normalized);
                });
                return fuzzy?.cover || '';
            }

            // Обновлённый профиль
            function showArtistModal(artist) {
                const monthlyListeners = getArtistMonthlyListeners(artist.name);
                const artistQueueIds = artist.popularSongs
                    .map(title => songs.find(s => normalizeName(s.title) === normalizeName(title))?.id)
                    .filter(Boolean);

                artistProfileContent.innerHTML = `
                    <div class="artist-profile-header">
                        <div class="artist-photo-wrap">
                            <img src="${artist.photo}" class="artist-detail-photo">
                        </div>
                        <div class="artist-profile-name">${artist.name}</div>
                        <div class="artist-profile-badge">Артист · ${formatPlayCount(monthlyListeners)} слуш./мес</div>
                    </div>
                    <div class="profile-section">
                        <h4>Альбомы</h4>
                        <div class="profile-albums">
                            ${artist.albums.map(alb => `<div class="album-item">${alb.title}</div>`).join('')}
                        </div>
                    </div>
                    <div class="profile-section">
                        <h4>Популярные песни</h4>
                        <div class="profile-songs">
                            ${artist.popularSongs.map(s => {
                                const cover = findSongCoverByTitle(s);
                                return `
                                    <div class="song-item" data-track-id="${songs.find(track => normalizeName(track.title) === normalizeName(s))?.id || ''}">
                                        ${cover
                                            ? `<img src="${cover}" class="song-item-cover" alt="Обложка ${s}">`
                                            : '<div class="song-item-cover-placeholder"></div>'}
                                        <div class="song-item-title">${s}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;

                artistProfileContent.querySelectorAll('.song-item[data-track-id]').forEach(item => {
                    const trackId = item.dataset.trackId;
                    if (!trackId) return;
                    item.style.cursor = 'pointer';
                    item.addEventListener('click', () => {
                        playTrackById(trackId, {
                            queueIds: artistQueueIds.length ? artistQueueIds : [trackId],
                            sectionId: `artist:${artist.id}`,
                            resetHistory: true
                        });
                        artistProfileModal.classList.remove('active');
                    });
                });

                artistProfileModal.classList.add('active');
            }

            // Инициализация
            if (shouldResetTrackPlays) {
                resetAllTrackPlaysToZero();
            }

            renderSongs();
            renderArtists();
            renderLikedSongs();
            renderUserSongs();
            updateAutoScrollButtonState();
            updateDeleteTrackButtonState();
            syncTrackPlayCountsWithSongs();
            persistAdminSongCatalog();

            (async () => {
                await migrateLegacyCustomTracksToDb();
                await hydrateCustomTracksFromDb();
                if (shouldResetTrackPlays) {
                    resetAllTrackPlaysToZero();
                    markTrackPlaysResetDone();
                    shouldResetTrackPlays = false;
                }
                syncTrackPlayCountsWithSongs();

                const currentFilter = searchInput.value || '';
                renderSongs(currentFilter);
                renderLikedSongs(currentFilter);
                renderUserSongs(currentFilter);
                updateDeleteTrackButtonState();
                persistAdminSongCatalog();
            })();
        })();
    </script>
</body>
</html>
